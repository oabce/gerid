services:
  app:
    build:
      context: .
      network: host
    container_name: portal-externo
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT_PUBLICO=3003
    volumes:
      - ./public/uploads:/app/public/uploads
